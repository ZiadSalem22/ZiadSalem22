name: GitHub Metrics

on:
  # Refresh once per day (05:00 UTC)
  schedule:
    - cron: "0 5 * * *"

  # Allow manual runs from the Actions tab
  workflow_dispatch:

  # Regenerate on pushes to the profile repo, but ignore the action's own
  # commit of github-metrics.svg so the workflow does not re-trigger itself.
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "github-metrics.svg"

permissions:
  contents: write

jobs:
  generate-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Generate profile metrics
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ZiadSalem22
          filename: github-metrics.svg

          base: header
          # Hide the header's left column (Joined GitHub… / Followed by…),
          # keeping avatar, name, mini-calendar and "Contributed to N repos".
          extras_css: ".items-wrapper > section:first-child .row > section:first-child { display: none; }"

          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
