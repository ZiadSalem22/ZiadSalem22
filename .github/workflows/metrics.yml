name: GitHub Metrics

on:
  # Refresh once per day (05:00 UTC)
  schedule:
    - cron: "0 5 * * *"

  # Allow manual runs from the Actions tab
  workflow_dispatch:

  # Regenerate on pushes to the profile repo, but ignore the action's own
  # commit of github-metrics.svg so the workflow does not re-trigger itself.
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "github-metrics.svg"

permissions:
  contents: write

jobs:
  generate-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Generate profile metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ZiadSalem22
          filename: github-metrics.svg

          base: header, activity, community, repositories
          base_indepth: yes

          config_display: columns

          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
